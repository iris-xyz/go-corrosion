name: Publish Corrosion Test Image

on:
  workflow_dispatch:
    inputs:
      corrosion_ref:
        description: 'Corrosion git ref to pin (short SHA)'
        required: true
        default: '1b0fcf1'
  push:
    branches: [main]
    paths:
      - 'corrosiontest/Dockerfile'
      - '.github/workflows/publish-test-image.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve corrosion ref
        id: ref
        run: |
          REF="${{ github.event.inputs.corrosion_ref }}"
          if [ -z "$REF" ]; then
            REF=$(awk -F'=' '/^ARG CORROSION_REF=/{print $2; exit}' corrosiontest/Dockerfile)
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: corrosiontest
          file: corrosiontest/Dockerfile
          push: true
          tags: ghcr.io/iris-xyz/corrosion-test:${{ steps.ref.outputs.ref }}
          build-args: |
            CORROSION_REF=${{ steps.ref.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
